name: Notify Feishu on Push

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit summary
        id: summary
        run: |
          PREV="${{ github.event.before }}"
          CURR="${{ github.sha }}"
          TOTAL="1"
          if git merge-base --is-ancestor "$PREV" "$CURR" 2>/dev/null; then
            TOTAL=$(git rev-list --count "$PREV..$CURR" 2>/dev/null || echo "1")
          fi
          AUTHOR="$(git log -1 --format='%an' "$CURR" 2>/dev/null || echo 'unknown')"
          FILES=$(git diff --name-only "$PREV..$CURR" 2>/dev/null | wc -l | xargs || echo "0")
          echo "commits=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "changed_files=$FILES" >> "$GITHUB_OUTPUT"
          echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Send to Feishu Bot
        run: |
          TOKEN=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.FEISHU_APP_ID }}\",\"app_secret\":\"${{ secrets.FEISHU_APP_SECRET }}\"}" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('tenant_access_token',''))")
          [ -z "$TOKEN" ] && exit 1
          MSG="📦 ${{ steps.summary.outputs.repo }} 有更新！\n\n**分支**: ${{ steps.summary.outputs.ref }}\n**提交者**: ${{ steps.summary.outputs.author }}\n**提交数**: ${{ steps.summary.outputs.commits }}\n**修改文件**: ${{ steps.summary.outputs.changed_files }} 个"
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"receive_id\":\"${{ secrets.FEISHU_USER_OPEN_ID }}\",\"msg_type\":\"text\",\"content\":\"{\\\"text\\\":\\\"$MSG\\\"}\"}"
