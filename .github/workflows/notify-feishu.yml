name: Notify Feishu on Push

on:
  push:
    branches: [main, master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate commit summary
        id: summary
        run: |
          PREV="${{ github.event.before }}"
          CURR="${{ github.sha }}"
          TOTAL="1"
          if git merge-base --is-ancestor "$PREV" "$CURR" 2>/dev/null; then
            TOTAL=$(git rev-list --count "$PREV..$CURR" 2>/dev/null || echo "1")
          fi
          AUTHOR="$(git log -1 --format='%an' "$CURR" 2>/dev/null || echo 'unknown')"
          FILES=$(git diff --name-only "$PREV..$CURR" 2>/dev/null | wc -l | xargs || echo "0")
          echo "commits=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "author=$AUTHOR" >> "$GITHUB_OUTPUT"
          echo "changed_files=$FILES" >> "$GITHUB_OUTPUT"
          echo "repo=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Send to Feishu via Webhook
        run: |
          MSG="📦 ${{ steps.summary.outputs.repo }} 有更新！\n\n**分支**: ${{ steps.summary.outputs.ref }}\n**提交者**: ${{ steps.summary.outputs.author }}\n**提交数**: ${{ steps.summary.outputs.commits }}\n**修改文件**: ${{ steps.summary.outputs.changed_files }} 个"
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"$MSG\"}}"
